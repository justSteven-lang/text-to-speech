apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: tts-scaledobject
  namespace: default
spec:
  scaleTargetRef:
    name: tts-app
  minReplicaCount: 2
  maxReplicaCount: 10
  triggers:
    - type: redis
      metadata:
        address: redis-master.default.svc.cluster.local:6379
        listName: tts-queue
        listLength: "5"
    - type: cpu
      metadata:
        type: Utilization
        value: "50"
